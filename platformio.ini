; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
packages_dir = ./.pio/packages
src_dir = main

[env]
framework = arduino
monitor_speed = 115200

[env:band]
platform = espressif32
board = lolin_s2_mini
lib_deps = 
	fastled/FastLED@^3.10.3
	featherfly/SoftwareSerial@^1.0
build_flags = ${env.build_flags} -Imain/band -Imain/band/include
build_src_filter = 
	+<band/*.cpp>
	+<band/src/*.cpp>

[env:reciever]
platform = espressif32
board = lolin32_lite
lib_deps = featherfly/SoftwareSerial@^1.0
build_flags = ${env.build_flags} -Imain/reciever -Imain/reciever/include
build_src_filter = 
	+<reciever/*.cpp>
	+<reciever/src/*.cpp>

[env:recieverArduino]
platform = atmelavr
board = nanoatmega328
lib_deps = 
	fastled/FastLED@^3.10.3
	prenticedavid/MCUFRIEND_kbv @ 3.1.0-Beta
	adafruit/Adafruit GFX Library @ ^1.12.5
	featherfly/SoftwareSerial@^1.0
build_flags = ${env.build_flags} -Imain/recieverArduino -Imain/recieverArduino/include
build_src_filter = 
	+<recieverArduino/*.cpp>
	+<recieverArduino/src/*.cpp>
