; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
packages_dir = ./.pio/packages
src_dir = main

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200

[env:band]
platform = espressif32
board = esp32dev
framework = arduino
src_dir = main/band
lib_extra_dirs = lib
monitor_speed = 115200

lib_deps = 

build_flags = ${env.build_flags} -Imain/band -Imain/band/include
build_src_filter = 
	+<band/*.cpp>
	+<band/src/*.cpp>


[env:reciever]
platform = espressif32
board = esp32dev
framework = arduino
src_dir = main/reciever
lib_extra_dirs = lib
monitor_speed = 115200

lib_deps = 

build_flags = ${env.build_flags} -Imain/reciever -Imain/reciever/include
build_src_filter = 
	+<reciever/*.cpp>
	+<reciever/src/*.cpp>